services:
  worker1:
    build:
      context: .
      dockerfile: Dockerfile
    # macOS / OrbStack 的 docker fallback worker 需要 privileged 才能让 bwrap 创建 user namespace。
    privileged: true
    ports:
      - "${SYMPHONY_LIVE_DOCKER_WORKER_1_PORT}:22"
    volumes:
      - ${SYMPHONY_LIVE_DOCKER_AUTHORIZED_KEY}:/run/symphony/ssh/authorized_key.pub:ro
      - ${SYMPHONY_LIVE_DOCKER_AUTH_JSON}:/root/.codex/auth.json:ro

  worker2:
    build:
      context: .
      dockerfile: Dockerfile
    # 与 worker1 保持一致，避免 SSH worker 行为与本地 fallback 语义不一致。
    privileged: true
    ports:
      - "${SYMPHONY_LIVE_DOCKER_WORKER_2_PORT}:22"
    volumes:
      - ${SYMPHONY_LIVE_DOCKER_AUTHORIZED_KEY}:/run/symphony/ssh/authorized_key.pub:ro
      - ${SYMPHONY_LIVE_DOCKER_AUTH_JSON}:/root/.codex/auth.json:ro
