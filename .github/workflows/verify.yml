name: Verify

on:
  push:
  pull_request:
  schedule:
    - cron: '0 1 * * 1'

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Shell Syntax Check
        run: bash -n $(find scripts -type f -name '*.sh' | sort)

      - name: Governance Checks
        run: scripts/harness/run-governance-checks.sh

      - name: OpenSpec Sync Check (Pull Request)
        if: github.event_name == 'pull_request'
        run: scripts/harness/check-openspec-sync.sh range "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"

      - name: OpenSpec Sync Check (Push)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: scripts/harness/check-openspec-sync.sh range "${{ github.event.before }}" "${{ github.sha }}"

      - name: Full Verify
        run: scripts/harness/full-verify.sh

      - name: Build Docker Images
        run: scripts/dev/build-image.sh all ci

      - name: Upload Reports On Failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: verify-reports
          if-no-files-found: ignore
          path: |
            **/surefire-reports/**
            **/failsafe-reports/**
            **/spotbugsXml.xml
